    <link rel="manifest" href="./site.webmanifest" />

  <body>
    <script>
      var style_content = {
        "atomic-pile": {
          themeColor: "#efd030"
        },
        "fungicide": {
          themeColor: "#880088"
        },
        "musicbot": {
          themeColor: "#00bFa9"
        },
        "notebook": {
          themeColor: "#ffffff"
        },
        "pumpkincoach": {
          themeColor: "#efd000"
        },
        "spacefrog": {
          themeColor: "#55aaff"
        },
        "benotafraid": {
          themeColor: "#55aaff"
        }
      }

      function replace_link(index, href, media) {
        var oldlink = document.getElementsByTagName("link").item(index);

        var newlink = document.createElement("link");
        newlink.setAttribute("rel", "stylesheet");
        newlink.setAttribute("type", "text/css");
        newlink.setAttribute("href", href);
        if(media) {
          newlink.setAttribute("media", media);
        }

        document.getElementsByTagName("head").item(index).replaceChild(newlink, oldlink);
      }

      function replace_css(path) {
        if(!(path in style_content)) return false;

        // Update Theme Colors
        document.querySelector("meta[name=msapplication-TileColor]").setAttribute("content", style_content[path]);
        document.querySelector("meta[name=theme-color]").setAttribute("content", style_content[path]);

        // Replace Style-Specific Sheets
        replace_link(2, "./styles/" + path + ".css");
        replace_link(3, "./styles/" + path + "-override-layout-mobile.css");
        replace_link(3, "./styles/" + path + "-override-layout.css", "only screen and (min-width: 600px)");

        return true;
      }

      function update_style_cookie(path) {
        if(replace_css(path)) {
          alert(path)
          document.cookie = "selected-style=" + path + "; path=/";
          alert(document.cookie)
        }
      }

      replace_css(document.cookie.split('; ').find(row => row.startsWith('selected-style='))?.split('=')?.[1]);
    </script>
    <div id="grid">
      <header id="header">
        <div class="title-strip">

          <div class="logo"></div>

        {% include navbar.html %}

      <main id="main">

          {{content}}
        </div>

      <footer>
        <div class="footer-stripe"><div class="footer-text">Footer</div></div>
      </footer>
    </div>
